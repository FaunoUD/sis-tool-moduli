        // ============ DEEP TREE HELPERS ============
        function findNode(pages, id) {
            for (const p of pages) {
                if (p.id === id) return p;
                if (p.children) { const found = findNode(p.children, id); if (found) return found; }
            }
            return null;
        }

        function findParent(pages, id) {
            for (const p of pages) {
                if (p.children) {
                    if (p.children.some(c => c.id === id)) return p;
                    const found = findParent(p.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function removeNode(pages, id) {
            return pages.filter(p => p.id !== id).map(p => ({ ...p, children: p.children ? removeNode(p.children, id) : [] }));
        }

        function insertNode(pages, parentId, node, index = -1) {
            return pages.map(p => {
                if (p.id === parentId) {
                    const children = [...(p.children || [])];
                    if (index >= 0) children.splice(index, 0, node);
                    else children.push(node);
                    return { ...p, children };
                }
                return { ...p, children: p.children ? insertNode(p.children, parentId, node, index) : [] };
            });
        }

        function updateNode(pages, id, updates) {
            return pages.map(p => {
                if (p.id === id) return { ...p, ...updates };
                return { ...p, children: p.children ? updateNode(p.children, id, updates) : [] };
            });
        }

        function countPages(pages) {
            let count = 0;
            for (const p of pages) { count++; if (p.children) count += countPages(p.children); }
            return count;
        }

        function getDepth(pages, depth = 0) {
            let max = depth;
            for (const p of pages) {
                if (p.children && p.children.length > 0) max = Math.max(max, getDepth(p.children, depth + 1));
            }
            return max;
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

        // ============ STORAGE ============
        const STORAGE_KEY = 'sitemap_creator_v2';

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.sitemaps && parsed.sitemaps.length > 0) return parsed;
                }
            } catch(e) {}
            return { activeSitemapId: DEFAULT_SITEMAPS[0].id, sitemaps: DEFAULT_SITEMAPS };
        }

        function saveState(state) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}

            CollapseAll: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 9V4.5M9 9H4.5M9 9L3.5 3.5M9 15v4.5M9 15H4.5M9 15l-5.5 5.5M15 9h4.5M15 9V4.5M15 9l5.5-5.5M15 15h4.5M15 15v4.5m0-4.5l5.5 5.5"/></svg>,
            Undo: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a5 5 0 015 5v2M3 10l4-4m-4 4l4 4"/></svg>,
            Redo: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 10H11a5 5 0 00-5 5v2m15-7l-4-4m4 4l-4 4"/></svg>,
            Share: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>,
            Print: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>,
            Duplicate: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>,
            MoveUp: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 15l7-7 7 7"/></svg>,
            MoveDown: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>,
            LevelUp: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>,
            LevelDown: () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>,
            X: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>,
        };

        // ============ MODAL ============
        function Modal({ isOpen, onClose, title, children, wide }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
                    <div className={`glass rounded-2xl p-6 w-full ${wide ? 'max-w-2xl' : 'max-w-md'} fade-in max-h-[90vh] overflow-y-auto`} onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-semibold text-gray-800 dark:text-white">{title}</h3>
                            <button onClick={onClose} className="p-1 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors"><Icons.X /></button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        }

        // ============ TOAST ============
        function Toast({ message, visible }) {
            if (!visible) return null;
            return <div className="fixed bottom-6 right-6 z-50 glass rounded-xl px-4 py-2.5 text-sm font-medium text-gray-800 dark:text-white fade-in shadow-lg">{message}</div>;
        }

        // ============ PAGE NODE ============
        function PageNode({ page, depth, sitemap, setSitemap, onEdit, dragState, setDragState, searchTerm, history }) {
            const nodeRef = useRef(null);
            const hasChildren = page.children && page.children.length > 0;
            const typeInfo = PAGE_TYPES[page.type] || PAGE_TYPES.page;
            const statusInfo = STATUS_OPTIONS[page.status] || STATUS_OPTIONS.none;
            const isMatch = searchTerm && page.name.toLowerCase().includes(searchTerm.toLowerCase());
            const isSearching = searchTerm && searchTerm.length > 0;

            const toggleCollapse = () => {
                history.push(sitemap);
                setSitemap(prev => ({ ...prev, pages: updateNode(prev.pages, page.id, { collapsed: !page.collapsed }) }));
            };

            const handleDragStart = (e) => {
                e.stopPropagation();
                setDragState({ draggingId: page.id, overId: null, position: null });
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', page.id);
                setTimeout(() => { if (nodeRef.current) nodeRef.current.classList.add('dragging'); }, 0);
            };

            const handleDragEnd = () => {
                if (nodeRef.current) nodeRef.current.classList.remove('dragging');
                setDragState({ draggingId: null, overId: null, position: null });
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (dragState.draggingId === page.id) return;
                const rect = nodeRef.current.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const third = rect.height / 3;
                let position = 'inside';
                if (y < third) position = 'before';
                else if (y > third * 2) position = 'after';
                setDragState(prev => ({ ...prev, overId: page.id, position }));
            };

            const handleDragLeave = (e) => {
                e.stopPropagation();
                if (dragState.overId === page.id) setDragState(prev => ({ ...prev, overId: null, position: null }));
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const dragId = dragState.draggingId;
                if (!dragId || dragId === page.id) return;

                history.push(sitemap);
                setSitemap(prev => {
                    let pages = deepClone(prev.pages);
                    const dragNode = findNode(pages, dragId);
                    if (!dragNode) return prev;
                    const dragNodeCopy = deepClone(dragNode);
                    pages = removeNode(pages, dragId);

                    if (dragState.position === 'inside') {
                        const target = findNode(pages, page.id);
                        if (target) { if (!target.children) target.children = []; target.children.push(dragNodeCopy); }
                    } else {
                        const parent = findParent(pages, page.id);
                        const siblings = parent ? parent.children : pages;
                        const idx = siblings.findIndex(p => p.id === page.id);
                        const insertIdx = dragState.position === 'before' ? idx : idx + 1;
                        siblings.splice(insertIdx, 0, dragNodeCopy);
                    }
                    return { ...prev, pages };
                });
                setDragState({ draggingId: null, overId: null, position: null });
            };

            const addChild = () => {
                history.push(sitemap);
                const newPage = { id: generateId(), name: 'New Page', path: '/', type: 'page', status: 'none', notes: '', collapsed: false, children: [] };
                setSitemap(prev => ({ ...prev, pages: updateNode(prev.pages, page.id, { children: [...(page.children || []), newPage], collapsed: false }) }));
            };

            const deletePage = () => {
                history.push(sitemap);
                setSitemap(prev => ({ ...prev, pages: removeNode(prev.pages, page.id) }));
            };

            const duplicatePage = () => {
                history.push(sitemap);
                const dup = deepClone(page);
                const reassignIds = (node) => { node.id = generateId(); (node.children || []).forEach(reassignIds); };
                reassignIds(dup);
                dup.name = page.name + ' (copy)';
                const parent = findParent(sitemap.pages, page.id);
                if (parent) setSitemap(prev => ({ ...prev, pages: insertNode(prev.pages, parent.id, dup) }));
                else setSitemap(prev => ({ ...prev, pages: [...prev.pages, dup] }));
            };

            const moveUp = () => {
                history.push(sitemap);
                setSitemap(prev => {
                    const pages = deepClone(prev.pages);
                    const parent = findParent(pages, page.id);
                    const siblings = parent ? parent.children : pages;
                    const idx = siblings.findIndex(p => p.id === page.id);
                    if (idx > 0) { [siblings[idx - 1], siblings[idx]] = [siblings[idx], siblings[idx - 1]]; }
                    return { ...prev, pages };
                });
            };

            const moveDown = () => {
                history.push(sitemap);
                setSitemap(prev => {
                    const pages = deepClone(prev.pages);
                    const parent = findParent(pages, page.id);
                    const siblings = parent ? parent.children : pages;
                    const idx = siblings.findIndex(p => p.id === page.id);
                    if (idx < siblings.length - 1) { [siblings[idx], siblings[idx + 1]] = [siblings[idx + 1], siblings[idx]]; }
                    return { ...prev, pages };
                });
            };

            const promoteLevel = () => {
                history.push(sitemap);
                setSitemap(prev => {
                    const pages = deepClone(prev.pages);
                    const parent = findParent(pages, page.id);
                    if (!parent) return prev;
                    const grandParent = findParent(pages, parent.id);
                    const node = deepClone(findNode(pages, page.id));
                    findNode(pages, parent.id).children = findNode(pages, parent.id).children.filter(c => c.id !== page.id);
                    if (grandParent) { const idx = grandParent.children.findIndex(c => c.id === parent.id); grandParent.children.splice(idx + 1, 0, node); }
                    else { const idx = pages.findIndex(c => c.id === parent.id); pages.splice(idx + 1, 0, node); }
                    return { ...prev, pages };
                });
            };

            const demoteLevel = () => {
                history.push(sitemap);
                setSitemap(prev => {
                    const pages = deepClone(prev.pages);
                    const parent = findParent(pages, page.id);
                    const siblings = parent ? parent.children : pages;
                    const idx = siblings.findIndex(p => p.id === page.id);
                    if (idx <= 0) return prev;
                    const prevSibling = siblings[idx - 1];
                    const node = deepClone(findNode(pages, page.id));
                    siblings.splice(idx, 1);
                    if (!prevSibling.children) prevSibling.children = [];
                    prevSibling.children.push(node);
                    return { ...prev, pages };
                });
            };

            const cycleStatus = () => {
                history.push(sitemap);
                const order = ['none', 'review', 'done'];
                const next = order[(order.indexOf(page.status) + 1) % order.length];
                setSitemap(prev => ({ ...prev, pages: updateNode(prev.pages, page.id, { status: next }) }));
            };

            const isOver = dragState.overId === page.id;
            const dropIndicator = isOver ? (
                dragState.position === 'before' ? 'border-t-2 border-brand-500' :
                dragState.position === 'after' ? 'border-b-2 border-brand-500' :
                'ring-2 ring-brand-500 ring-inset'
            ) : '';

            if (isSearching && !isMatch && (!hasChildren || !page.children.some(c => {
                const check = (n) => n.name.toLowerCase().includes(searchTerm.toLowerCase()) || (n.children || []).some(check);
                return check(c);
            }))) return null;

            return (
                <div className={`${depth > 0 ? 'ml-8 tree-line' : ''} fade-in`}>
                    <div
                        ref={nodeRef}
                        draggable
                        onDragStart={handleDragStart}
                        onDragEnd={handleDragEnd}
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                        className={`glass-card rounded-xl p-3 mb-2 group cursor-grab active:cursor-grabbing ${dropIndicator} ${isMatch ? 'ring-2 ring-yellow-400' : ''}`}
                    >
                        <div className="flex items-center gap-2">
                            <div className="flex-shrink-0 cursor-grab active:cursor-grabbing text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"><Icons.Grip /></div>

                            {hasChildren ? (
                                <button onClick={toggleCollapse} className="flex-shrink-0 p-0.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-500 dark:text-gray-400">
                                    {page.collapsed ? <Icons.ChevronRight /> : <Icons.ChevronDown />}
                                </button>
                            ) : <div className="w-5" />}

                            <span className="text-lg flex-shrink-0">{typeInfo.icon}</span>

                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 flex-wrap">
                                    <span className="font-semibold text-gray-800 dark:text-white text-sm truncate">{page.name}</span>
                                    <span className={`page-type-badge ${typeInfo.color}`}>{typeInfo.label}</span>
                                    <button onClick={cycleStatus} className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${statusInfo.dot} cursor-pointer hover:scale-125 transition-transform`} title={statusInfo.label} />
                                </div>
                                <span className="text-xs text-gray-500 dark:text-gray-400 font-mono">{page.path}</span>
                            </div>

                            <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 no-print">
                                <button onClick={moveUp} className="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors tooltip" data-tip="Move up"><Icons.MoveUp /></button>
                                <button onClick={moveDown} className="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors tooltip" data-tip="Move down"><Icons.MoveDown /></button>
                                <button onClick={promoteLevel} className="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors tooltip" data-tip="Level up"><Icons.LevelUp /></button>
                                <button onClick={demoteLevel} className="p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors tooltip" data-tip="Level down"><Icons.LevelDown /></button>
                                <div className="w-px h-4 bg-gray-300 dark:bg-gray-600 mx-0.5" />
                                <button onClick={addChild} className="p-1 rounded hover:bg-green-100 dark:hover:bg-green-900/30 text-gray-400 hover:text-green-600 dark:hover:text-green-400 transition-colors tooltip" data-tip="Add child"><Icons.Plus /></button>
                                <button onClick={duplicatePage} className="p-1 rounded hover:bg-blue-100 dark:hover:bg-blue-900/30 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors tooltip" data-tip="Duplicate"><Icons.Duplicate /></button>
                                <button onClick={() => onEdit(page)} className="p-1 rounded hover:bg-brand-100 dark:hover:bg-brand-900/30 text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors tooltip" data-tip="Edit"><Icons.Edit /></button>
                                <button onClick={deletePage} className="p-1 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-500 transition-colors tooltip" data-tip="Delete"><Icons.Trash /></button>
                            </div>
                        </div>
                        {page.notes && <p className="text-xs text-gray-500 dark:text-gray-400 mt-1.5 ml-12 italic line-clamp-1">{page.notes}</p>}
                    </div>

                    {hasChildren && !page.collapsed && (
                        <div className="collapse-transition">
                            {page.children.map(child => (
                                <PageNode key={child.id} page={child} depth={depth + 1} sitemap={sitemap} setSitemap={setSitemap} onEdit={onEdit} dragState={dragState} setDragState={setDragState} searchTerm={searchTerm} history={history} />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ============ EDIT MODAL ============
        function EditPageModal({ page, isOpen, onClose, onSave }) {
            const [form, setForm] = useState({ name: '', path: '', type: 'page', status: 'none', notes: '' });
            useEffect(() => { if (page) setForm({ name: page.name, path: page.path, type: page.type, status: page.status, notes: page.notes || '' }); }, [page]);
            const handleSave = () => { onSave(page.id, form); onClose(); };

            return (
                <Modal isOpen={isOpen} onClose={onClose} title="Edit Node">
                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Name</label>
                            <input value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500" />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">URL Path</label>
                            <input value={form.path} onChange={e => setForm(f => ({...f, path: e.target.value}))} className="w-full glass-input rounded-xl px-3 py-2 text-sm font-mono text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500" />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Type</label>
                                <select value={form.type} onChange={e => setForm(f => ({...f, type: e.target.value}))} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                                    {Object.entries(PAGE_TYPES).map(([key, val]) => <option key={key} value={key}>{val.icon} {val.label}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
                                <select value={form.status} onChange={e => setForm(f => ({...f, status: e.target.value}))} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                                    {Object.entries(STATUS_OPTIONS).map(([key, val]) => <option key={key} value={key}>{val.label}</option>)}
                                </select>
                            </div>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Notes</label>
                            <textarea value={form.notes} onChange={e => setForm(f => ({...f, notes: e.target.value}))} rows={3} className="w-full glass-input rounded-xl px-3 py-2 text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none" />
                        </div>
                        <div className="flex justify-end gap-2 pt-2">
                            <button onClick={onClose} className="px-4 py-2 text-sm rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                            <button onClick={handleSave} className="px-4 py-2 text-sm rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition-colors font-medium">Save</button>
                        </div>
                    </div>
                </Modal>
            );
        }

        // ============ UNDO ============
        function useHistory(maxSize = 50) {
            const undoStack = useRef([]);
            const redoStack = useRef([]);
            return useMemo(() => ({
                push: (state) => { undoStack.current.push(deepClone(state)); if (undoStack.current.length > maxSize) undoStack.current.shift(); redoStack.current = []; },
                undo: (current, setCurrent) => { if (undoStack.current.length === 0) return; redoStack.current.push(deepClone(current)); setCurrent(undoStack.current.pop()); },
                redo: (current, setCurrent) => { if (redoStack.current.length === 0) return; undoStack.current.push(deepClone(current)); setCurrent(redoStack.current.pop()); },
                canUndo: () => undoStack.current.length > 0,
                canRedo: () => redoStack.current.length > 0,
            }), []);
        }

        // ============ MAIN APP ============
        function App() {
            const [state, setState] = useState(() => loadState());
            const [dark, setDark] = useState(() => localStorage.getItem('sitemap_dark') === 'true');
            const [editingPage, setEditingPage] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [dragState, setDragState] = useState({ draggingId: null, overId: null, position: null });
            const [toast, setToast] = useState({ message: '', visible: false });
            const [renamingSitemapId, setRenamingSitemapId] = useState(null);
            const [renameValue, setRenameValue] = useState('');
            const fileInputRef = useRef(null);
            const history = useHistory();

            const activeSitemap = state.sitemaps.find(s => s.id === state.activeSitemapId) || state.sitemaps[0];

            const setActiveSitemap = (updater) => {
                setState(prev => ({
                    ...prev,
                    sitemaps: prev.sitemaps.map(s => s.id === prev.activeSitemapId ? (typeof updater === 'function' ? updater(s) : updater) : s)
                }));
            };

            useEffect(() => { saveState(state); }, [state]);
            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                document.body.classList.toggle('dark', dark);
                localStorage.setItem('sitemap_dark', dark);
            }, [dark]);

            useEffect(() => {
                const handler = (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); history.undo(activeSitemap, (val) => setActiveSitemap(val)); }
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); history.redo(activeSitemap, (val) => setActiveSitemap(val)); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [activeSitemap]);

            const showToast = (msg) => { setToast({ message: msg, visible: true }); setTimeout(() => setToast(t => ({ ...t, visible: false })), 2500); };

            // Sitemap management
            const addSitemap = () => {
                const newSitemap = { id: generateId(), name: 'New Role', description: '', pages: [] };
                setState(prev => ({ activeSitemapId: newSitemap.id, sitemaps: [...prev.sitemaps, newSitemap] }));
                showToast('Sitemap created');
            };

            const deleteSitemap = (id) => {
                if (state.sitemaps.length <= 1) { showToast('Cannot delete the last sitemap'); return; }
                if (!confirm('Delete this sitemap?')) return;
                setState(prev => {
                    const filtered = prev.sitemaps.filter(s => s.id !== id);
                    return { activeSitemapId: filtered[0].id, sitemaps: filtered };
                });
                showToast('Sitemap deleted');
            };

            const duplicateSitemap = (id) => {
                const source = state.sitemaps.find(s => s.id === id);
                if (!source) return;
                const dup = deepClone(source);
                dup.id = generateId();
                dup.name = source.name + ' (copy)';
                const reassignAllIds = (pages) => pages.map(p => ({ ...p, id: generateId(), children: p.children ? reassignAllIds(p.children) : [] }));
                dup.pages = reassignAllIds(dup.pages);
                setState(prev => ({ activeSitemapId: dup.id, sitemaps: [...prev.sitemaps, dup] }));
                showToast('Sitemap duplicated');
            };

            const startRenameSitemap = (id) => {
                const sm = state.sitemaps.find(s => s.id === id);
                setRenamingSitemapId(id);
                setRenameValue(sm?.name || '');
            };

            const finishRenameSitemap = () => {
                if (renamingSitemapId && renameValue.trim()) {
                    setState(prev => ({
                        ...prev,
                        sitemaps: prev.sitemaps.map(s => s.id === renamingSitemapId ? { ...s, name: renameValue.trim() } : s)
                    }));
                }
                setRenamingSitemapId(null);
                setRenameValue('');
            };

            // Page operations
            const addRootPage = () => {
                history.push(activeSitemap);
                const newPage = { id: generateId(), name: 'New Page', path: '/', type: 'page', status: 'none', notes: '', collapsed: false, children: [] };
                setActiveSitemap(prev => ({ ...prev, pages: [...prev.pages, newPage] }));
            };

            const handleEditSave = (id, updates) => {
                history.push(activeSitemap);
                setActiveSitemap(prev => ({ ...prev, pages: updateNode(prev.pages, id, updates) }));
            };

            const setCollapseAll = (val) => {
                const apply = (pages) => pages.map(p => ({ ...p, collapsed: val, children: p.children ? apply(p.children) : [] }));
                history.push(activeSitemap);
                setActiveSitemap(prev => ({ ...prev, pages: apply(prev.pages) }));
            };

            const exportJSON = () => {
                const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'sitemaps.json'; a.click(); URL.revokeObjectURL(url);
                showToast('Exported!');
            };

            const importJSON = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data && data.sitemaps) { setState(data); showToast('Imported!'); }
                        else if (data && data.pages) {
                            // Legacy single sitemap format
                            setState({ activeSitemapId: data.id, sitemaps: [data] });
                            showToast('Imported (legacy format)!');
                        }
                    } catch(err) { showToast('Invalid JSON file'); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const shareLink = () => {
                try {
                    const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
                    const url = window.location.origin + window.location.pathname + '#' + encoded;
                    navigator.clipboard.writeText(url).then(() => showToast('Link copied!')).catch(() => showToast('Copy failed'));
                } catch(e) { showToast('Sitemap too large to share via URL — use Export instead'); }
            };

            const totalPages = countPages(activeSitemap.pages);
            const maxDepth = getDepth(activeSitemap.pages);

            return (
                <div className="min-h-screen p-4 md:p-6 lg:p-8 max-w-5xl mx-auto">
                    {/* Header */}
                    <header className="glass rounded-2xl p-5 mb-4 no-print">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white text-xl shadow-lg">🗺️</div>
                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 dark:text-white">SIS Sitemap Creator</h1>
                                    <p className="text-xs text-gray-500 dark:text-gray-400">Visual sitemap builder — role-based views</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => history.undo(activeSitemap, (val) => setActiveSitemap(val))} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip disabled:opacity-30" data-tip="Undo" disabled={!history.canUndo()}><Icons.Undo /></button>
                                <button onClick={() => history.redo(activeSitemap, (val) => setActiveSitemap(val))} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip disabled:opacity-30" data-tip="Redo" disabled={!history.canRedo()}><Icons.Redo /></button>
                                <div className="w-px h-6 bg-gray-300 dark:bg-gray-600" />
                                <button onClick={() => setDark(!dark)} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip={dark ? 'Light mode' : 'Dark mode'}>
                                    {dark ? <Icons.Sun /> : <Icons.Moon />}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Sitemap Tabs */}
                    <div className="glass rounded-2xl p-3 mb-4 no-print">
                        <div className="flex items-center gap-2 overflow-x-auto pb-1">
                            {state.sitemaps.map(sm => (
                                <div key={sm.id} className={`sitemap-tab glass-card rounded-xl px-3 py-2 flex items-center gap-2 cursor-pointer flex-shrink-0 group ${sm.id === state.activeSitemapId ? 'active' : ''}`}>
                                    {renamingSitemapId === sm.id ? (
                                        <input
                                            value={renameValue}
                                            onChange={e => setRenameValue(e.target.value)}
                                            onBlur={finishRenameSitemap}
                                            onKeyDown={e => { if (e.key === 'Enter') finishRenameSitemap(); if (e.key === 'Escape') { setRenamingSitemapId(null); } }}
                                            autoFocus
                                            className="bg-transparent border-b border-brand-500 outline-none text-sm font-semibold text-gray-800 dark:text-white w-24"
                                        />
                                    ) : (
                                        <span
                                            onClick={() => setState(prev => ({ ...prev, activeSitemapId: sm.id }))}
                                            onDoubleClick={() => startRenameSitemap(sm.id)}
                                            className="text-sm font-semibold text-gray-700 dark:text-gray-200 select-none"
                                        >
                                            {sm.name}
                                        </span>
                                    )}
                                    <span className="text-[10px] text-gray-400 dark:text-gray-500 font-mono">{countPages(sm.pages)}</span>
                                    <div className="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={(e) => { e.stopPropagation(); duplicateSitemap(sm.id); }} className="p-0.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-blue-500 transition-colors tooltip" data-tip="Duplicate"><Icons.Duplicate /></button>
                                        {state.sitemaps.length > 1 && (
                                            <button onClick={(e) => { e.stopPropagation(); deleteSitemap(sm.id); }} className="p-0.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-400 hover:text-red-500 transition-colors tooltip" data-tip="Delete"><Icons.Trash /></button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            <button onClick={addSitemap} className="flex items-center gap-1 px-3 py-2 rounded-xl text-sm text-gray-500 dark:text-gray-400 hover:text-brand-600 hover:bg-brand-50 dark:hover:bg-brand-900/20 transition-colors flex-shrink-0">
                                <Icons.Plus /> <span>Add Role</span>
                            </button>
                        </div>
                    </div>

                    {/* Active Sitemap Info + Toolbar */}
                    <div className="glass rounded-2xl p-5 mb-4">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
                            <div>
                                <h2 className="text-lg font-bold text-gray-800 dark:text-white">{activeSitemap.name}</h2>
                                {activeSitemap.description && <p className="text-sm text-gray-500 dark:text-gray-400">{activeSitemap.description}</p>}
                            </div>
                            <div className="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
                                <span className="glass-card px-2.5 py-1 rounded-lg font-medium">{totalPages} nodes</span>
                                <span className="glass-card px-2.5 py-1 rounded-lg font-medium">{maxDepth + 1} levels</span>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center gap-2 no-print">
                            <div className="relative flex-1 min-w-[200px] max-w-sm">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Icons.Search /></div>
                                <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search pages..." className="w-full glass-input rounded-xl pl-9 pr-3 py-2 text-sm text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand-500 placeholder-gray-400" />
                            </div>
                            <button onClick={() => setCollapseAll(false)} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Expand all"><Icons.ExpandAll /></button>
                            <button onClick={() => setCollapseAll(true)} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Collapse all"><Icons.CollapseAll /></button>
                            <div className="w-px h-6 bg-gray-300 dark:bg-gray-600" />
                            <button onClick={addRootPage} className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition-colors text-sm font-medium shadow-sm">
                                <Icons.Plus /> <span className="hidden sm:inline">Add</span>
                            </button>
                            <button onClick={shareLink} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Copy link"><Icons.Share /></button>
                            <button onClick={exportJSON} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Export JSON"><Icons.Download /></button>
                            <button onClick={() => fileInputRef.current?.click()} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Import JSON"><Icons.Upload /></button>
                            <button onClick={() => window.print()} className="p-2 rounded-xl glass-card text-gray-600 dark:text-gray-300 hover:text-brand-600 transition-colors tooltip" data-tip="Print"><Icons.Print /></button>
                            <input ref={fileInputRef} type="file" accept=".json" onChange={importJSON} className="hidden" />
                        </div>
                    </div>

                    {/* Tree */}
                    <div className="min-h-[300px]">
                        {activeSitemap.pages.length === 0 ? (
                            <div className="glass rounded-2xl p-12 text-center">
                                <div className="text-5xl mb-4">🗺️</div>
                                <h3 className="text-lg font-semibold text-gray-700 dark:text-gray-300 mb-2">No pages yet</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Start building the sitemap for <strong>{activeSitemap.name}</strong></p>
                                <button onClick={addRootPage} className="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-brand-600 text-white hover:bg-brand-700 transition-colors text-sm font-medium">
                                    <Icons.Plus /> Add first page
                                </button>
                            </div>
                        ) : (
                            activeSitemap.pages.map(page => (
                                <PageNode key={page.id} page={page} depth={0} sitemap={activeSitemap} setSitemap={setActiveSitemap} onEdit={setEditingPage} dragState={dragState} setDragState={setDragState} searchTerm={searchTerm} history={history} />
                            ))
                        )}
                    </div>

                    {/* Hint */}
                    <div className="glass rounded-2xl p-4 mt-6 text-center no-print">
                        <p className="text-xs text-gray-500 dark:text-gray-400">
                            Drag nodes to reorder. Click the status dot to cycle through: <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full border border-gray-300 inline-block" /> None</span> → <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-400 inline-block" /> In Review</span> → <span className="inline-flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-400 inline-block" /> Done</span>
                            <br /><kbd className="px-1.5 py-0.5 rounded bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-[10px] font-mono">Ctrl+Z</kbd> Undo · <kbd className="px-1.5 py-0.5 rounded bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-[10px] font-mono">Ctrl+Y</kbd> Redo · Double-click tab name to rename
                        </p>
                    </div>

                    <footer className="text-center mt-8 mb-4 text-xs text-gray-400 dark:text-gray-500 no-print">
                        SIS Sitemap Creator — State auto-saved in browser
                    </footer>

                    <EditPageModal page={editingPage} isOpen={!!editingPage} onClose={() => setEditingPage(null)} onSave={handleEditSave} />
                    <Toast message={toast.message} visible={toast.visible} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
